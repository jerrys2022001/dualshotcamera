<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Download Dual Shot Camera</title>
    <meta
      name="description"
      content="Scan the QR code or open the App Store to download Dual Shot Camera."
    />
    <meta name="apple-itunes-app" content="app-id=6761664966" />

    <style>
@import"https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap";:root{--invite-bg: #f7f1ea;--invite-surface: rgba(255, 255, 255, .74);--invite-surface-border: rgba(255, 255, 255, .9);--invite-text: #172033;--invite-muted: #5f6b7b;--invite-shadow: 0 36px 90px rgba(23, 32, 51, .16);--invite-button: #172033;--invite-button-hover: #0d1524;--invite-coral: #ff8b68;--invite-rose: #ff6f98;--invite-blue: #4a9dff}*{box-sizing:border-box}html{background:radial-gradient(circle at top left,rgba(255,139,104,.22),transparent 32%),radial-gradient(circle at top right,rgba(74,157,255,.26),transparent 28%),linear-gradient(180deg,#fffaf4 0%,var(--invite-bg) 100%)}body{margin:0;min-height:100vh;min-height:100svh;font-family:Manrope,Avenir Next,Segoe UI,sans-serif;color:var(--invite-text)}#invite-app{min-height:100vh;min-height:100svh;display:flex;align-items:center;justify-content:center;padding:28px}.invite-shell{width:min(100%,920px);position:relative}.invite-brand{display:inline-flex;align-items:center;gap:.6rem;color:var(--invite-text);text-decoration:none;font-size:.86rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase}.invite-brand:before{content:"";width:.75rem;height:.75rem;border-radius:999px;background:linear-gradient(135deg,var(--invite-coral),var(--invite-blue));box-shadow:0 0 0 .3rem #ffffffb8}.invite-card{position:relative;overflow:hidden;margin-top:1.4rem;padding:clamp(2rem,4vw,3.3rem);border-radius:2rem;border:1px solid var(--invite-surface-border);background:var(--invite-surface);box-shadow:var(--invite-shadow);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);display:grid;justify-items:center;gap:1.15rem;text-align:center}.invite-card:before,.invite-card:after{content:"";position:absolute;inset:auto;width:14rem;height:14rem;border-radius:999px;filter:blur(16px);opacity:.55;pointer-events:none}.invite-card:before{top:-5rem;right:-4rem;background:radial-gradient(circle,rgba(255,139,104,.34),transparent 68%)}.invite-card:after{bottom:-6rem;left:-4rem;background:radial-gradient(circle,rgba(74,157,255,.24),transparent 68%)}.invite-kicker{margin:0;color:var(--invite-muted);font-size:.78rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase}h1{margin:0;max-width:14ch;font-family:Fraunces,Iowan Old Style,Times New Roman,serif;font-size:clamp(2.8rem,6vw,4.9rem);line-height:.95;letter-spacing:-.04em}.invite-body{margin:0;max-width:36ch;color:var(--invite-muted);font-size:clamp(1rem,2vw,1.08rem);line-height:1.7}.invite-qr-link{display:inline-flex;justify-content:center;text-decoration:none;transform:translateY(0);transition:transform .18s ease,box-shadow .18s ease}.invite-qr-link:hover,.invite-qr-link:focus-visible{transform:translateY(-4px)}.invite-qr-frame{display:inline-flex;width:fit-content;margin-inline:auto;padding:1rem;border-radius:1.85rem;background:#fffffff5;box-shadow:0 1px #ffffffe6,0 20px 48px #17203324}.invite-qr-frame img{display:block;width:min(100%,320px);aspect-ratio:1;object-fit:cover;border-radius:1.25rem}.invite-download-link{display:inline-flex;align-items:center;justify-content:center;min-height:3.7rem;padding:.95rem 1.7rem;border-radius:999px;background:linear-gradient(135deg,var(--invite-button),#24334d);color:#fff9f6;text-decoration:none;font-size:1rem;font-weight:700;letter-spacing:.02em;box-shadow:0 18px 34px #17203338;transition:transform .18s ease,box-shadow .18s ease,background .18s ease}.invite-download-link:hover,.invite-download-link:focus-visible{transform:translateY(-2px);background:linear-gradient(135deg,var(--invite-button-hover),#1a2740);box-shadow:0 22px 38px #17203342}.invite-helper{margin:0;max-width:32ch;color:var(--invite-muted);font-size:.95rem;line-height:1.6}.invite-qr-link:focus-visible,.invite-download-link:focus-visible,.invite-brand:focus-visible{outline:3px solid rgba(74,157,255,.38);outline-offset:4px}@media(max-width:640px){#invite-app{padding:18px}.invite-card{padding:1.5rem;gap:1rem;border-radius:1.6rem}.invite-body,.invite-helper{max-width:100%}.invite-qr-frame{padding:.8rem;border-radius:1.45rem}.invite-qr-frame img{width:min(100%,280px);border-radius:1rem}.invite-download-link{width:100%}}@media(prefers-reduced-motion:reduce){.invite-qr-link,.invite-download-link{transition:none}.invite-qr-link:hover,.invite-qr-link:focus-visible,.invite-download-link:hover,.invite-download-link:focus-visible{transform:none}}

    </style>
  </head>
  <body>
    <div id="invite-app">
      <div class="invite-shell">
        <a class="invite-brand" href="./">Dual Shot Camera</a>

        <main class="invite-card" aria-labelledby="invite-title">
          <p class="invite-kicker">Direct download</p>
          <h1 id="invite-title">Download Dual Shot Camera</h1>
          <p class="invite-body">
            Capture front and back video in one take — a focused dual-camera workspace on iPhone.
          </p>

          <a
            class="invite-qr-link"
            href="https://apps.apple.com/app/id6761664966"
            aria-label="Open Dual Shot Camera on the App Store"
            data-invite-qr-link
          >
            <span class="invite-qr-frame">
              <img
                src=""
                alt="QR code to download Dual Shot Camera from the App Store"
                data-invite-qr-image
              />
            </span>
          </a>

          <a
            class="invite-download-link"
            href="https://apps.apple.com/app/id6761664966"
            aria-label="Download Dual Shot Camera on the App Store"
            data-invite-download-link
          >
            Download on the App Store
          </a>

          <p class="invite-helper" data-invite-helper>
            Scan the QR code on your phone or tap the button to open the App Store.
          </p>
        </main>
      </div>
    </div>

    <script type="module">
      const APP_STORE_URL = 'https://apps.apple.com/app/id6761664966';

      function pickUrl() {
        const params = new URLSearchParams(window.location.search);
        const candidate = params.get('url') || params.get('link');
        if (!candidate) return APP_STORE_URL;
        try {
          const url = new URL(candidate);
          return url.href;
        } catch {
          return APP_STORE_URL;
        }
      }

      const targetUrl = pickUrl();
      for (const el of document.querySelectorAll('[data-invite-qr-link], [data-invite-download-link]')) {
        el.setAttribute('href', targetUrl);
      }
      const qrImg = document.querySelector('[data-invite-qr-image]');
      if (qrImg) {
        qrImg.setAttribute(
          'src',
          'https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=' + encodeURIComponent(targetUrl)
        );
      }
    </script>
  </body>
</html>
